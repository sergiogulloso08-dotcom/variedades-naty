<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variedades Naty</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #ff69b4;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    button {
      background-color: #ff69b4;
      border: none;
      color: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff1493;
    }
  </style>
</head>
<body>

<header>
  <h1>Variedades Naty</h1>
  <p>Todo lo que necesitas en un solo lugar</p>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#productos">Productos</a>
  <a href="#contacto">Contacto</a>
</nav>

<div class="container">
  <h2 id="productos">Productos</h2>
  <div class="productos">

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Producto 1">
      <h3>Producto 1</h3>
      <p>$10.000</p>
      <button onclick="comprar('Producto 1')">Comprar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Producto 2">
      <h3>Producto 2</h3>
      <p>$15.000</p>
      <button onclick="comprar('Producto 2')">Comprar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Producto 3">
      <h3>Producto 3</h3>
      <p>$20.000</p>
      <button onclick="comprar('Producto 3')">Comprar</button>
    </div>

  </div>
</div>

<div class="container" id="contacto">
  <h2>Contacto</h2>
  <p>WhatsApp: 300 000 0000</p>
  <p>Email: contacto@variedadesnaty.com</p>
</div>

<footer>
  <p>&copy; 2026 Variedades Naty</p>
</footer>

<script>
  function comprar(producto) {
    alert('Has seleccionado: ' + producto);
  }
</script>

</body>
</html>
